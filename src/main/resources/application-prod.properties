# ─────────────────────────────────────────────────────────────
# application-prod.properties
# ─────────────────────────────────────────────────────────────

# ── Oracle DataSource ─────────────────────────────────────────
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Connection URL format:
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Show formatted SQL in console during development
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Use 'update' in early development so Hibernate adjusts tables
# automatically when you add/change entity fields.
# Switch back to 'validate' once schema is stable.
spring.jpa.hibernate.ddl-auto=validate

logging.level.org.hibernate.orm.jdbc.bind=DEBUG
logging.level.com.mts.mts_purchase_service=DEBUG
