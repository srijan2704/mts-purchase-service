spring.application.name=mts-purchase-service
spring.config.import=optional:file:.env[.properties]
# ─────────────────────────────────────────────────────────────
# application.properties
# ─────────────────────────────────────────────────────────────

# ── Active Profile ────────────────────────────────────────────
spring.profiles.active=${PROJ_ENVIRONMENT}

# ── Server ────────────────────────────────────────────────────
server.address=0.0.0.0
server.port=8080

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate

# Print SQL queries to console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Oracle dialect — tells Hibernate to generate Oracle-compatible SQL
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Prevent "open session in view" warning
spring.jpa.open-in-view=false

# ── Connection Pool (HikariCP — Spring Boot default) ──────────
# HikariCP is bundled with spring-boot-starter-data-jpa
# Tune these based on your machine's available resources
spring.datasource.hikari.pool-name=mtspurchaseservicepool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-init-sql=ALTER SESSION DISABLE PARALLEL DML

# ── Logging ───────────────────────────────────────────────────
# Your app code
logging.level.com.mts.mts_purchase_service=INFO
# Show Hibernate SQL bindings (shows actual values in queries)
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=WARN
# Suppress noisy Spring startup logs
logging.level.org.springframework=WARN
logging.level.org.springframework.web=INFO
# Log file location
logging.file.name=logs/mts.log

# ── Email (OTP delivery) ──────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Auth Registration OTP ─────────────────────────────────────
auth.registration.otp.enabled=${AUTH_REG_OTP_ENABLED:true}
auth.registration.otp.from-email=${AUTH_REG_OTP_FROM_EMAIL:}
auth.registration.otp.owner-email=${AUTH_REG_OTP_OWNER_EMAIL:}
auth.registration.otp.ttl-minutes=${AUTH_REG_OTP_TTL_MINUTES:10}
auth.registration.otp.max-attempts=${AUTH_REG_OTP_MAX_ATTEMPTS:5}
auth.registration.otp.dev-log-enabled=${AUTH_REG_OTP_DEV_LOG_ENABLED:false}

# Enforce HTTPS for auth endpoints in non-local environments.
auth.transport.require-https=${AUTH_TRANSPORT_REQUIRE_HTTPS:false}

# Rate limit login + OTP auth endpoints (per client IP).
auth.rate-limit.enabled=${AUTH_RATE_LIMIT_ENABLED:true}
auth.rate-limit.max-requests=${AUTH_RATE_LIMIT_MAX_REQUESTS:5}
auth.rate-limit.window-seconds=${AUTH_RATE_LIMIT_WINDOW_SECONDS:30}

# Comma-separated allowlist for browser origins that can call API from JS.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500}
