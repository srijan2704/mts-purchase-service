# ─────────────────────────────────────────────────────────────
# application-dev.properties
# ─────────────────────────────────────────────────────────────

# ── Oracle DataSource ─────────────────────────────────────────
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/ORCLPDB1

# Oracle user created for this application
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── Dev-only JPA overrides ────────────────────────────────────
# Show formatted SQL in console during development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use 'update' in early development so Hibernate adjusts tables
# automatically when you add/change entity fields.
# Switch back to 'validate' once schema is stable.
spring.jpa.hibernate.ddl-auto=update

# ── Dev-only Logging overrides ────────────────────────────────
# Show Hibernate parameter binding (actual values in queries)
# Useful to debug what values are being sent to Oracle
logging.level.org.hibernate.orm.jdbc.bind=DEBUG
logging.level.com.mts.mts_purchase_service=DEBUG
